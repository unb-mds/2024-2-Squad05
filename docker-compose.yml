services:
  # Web application
  web:
    container_name: lumina-web
    build: .
    ports:
      - "8110:8110"
    volumes:
      - .:/app
    environment:
      - DEBUG= True
    depends_on:
      - migration
      - db
    command: python manage.py runserver 0.0.0.0:8110

  # Migration
  migration:
    container_name: lumina-migration
    build: .
    volumes:
      - .:/app
    environment:
      - DEBUG= True
    depends_on:
      - db
    command: python manage.py migrate

  # Database
  db:
    image: postgres:latest
    container_name: lumina-db
    environment:
      POSTGRES_DB: lumina_db
      POSTGRES_USER: lumina_user
      POSTGRES_PASSWORD: lumina_password
    volumes:
      - lumina_db_data:/var/lib/postgresql/data
    ports:
      - "5435:5435"

volumes:
  lumina_db_data:


